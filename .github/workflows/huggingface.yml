name: Sync to Hugging Face

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          git clone https://mabrudan:${HF_TOKEN}@huggingface.co/spaces/mabrudan/promoter-predictor hf-space

          rsync -av --delete \
            --exclude=".git" \
            --exclude="hf-space" \
            ./ hf-space/

          cd hf-space

          git add .
          git commit -m "Automatic update" || echo "Nothing to commit"
          git push
